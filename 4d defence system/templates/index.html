<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4D AUTONOMOUS SHIELD :: OLED BLACK</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-red: #ff003c; --terminal-green: #00ff66; }
        body { background: #000000; color: var(--neon-blue); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        #ui-overlay { position: absolute; top: 30px; left: 30px; z-index: 10; display: flex; flex-direction: column; gap: 20px; pointer-events: none; }
        .box { background: rgba(5, 5, 5, 0.95); border: 1px solid var(--neon-blue); padding: 20px; border-radius: 8px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.1); width: 300px; }
        .box h2 { font-size: 1rem; margin: 0 0 15px 0; border-bottom: 1px dashed var(--neon-blue); padding-bottom: 10px; letter-spacing: 2px; }
        .stat { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; }
        .val { color: #fff; font-weight: bold; }

        #terminal-box { position: absolute; bottom: 40px; right: 40px; width: 450px; height: 200px; background: rgba(0, 0, 0, 0.9); border-left: 4px solid var(--neon-red); color: var(--terminal-green); padding: 20px; font-size: 0.8rem; overflow: hidden; z-index: 10; }
        #logs { display: flex; flex-direction: column; gap: 6px; }
        .alert { color: var(--neon-red); font-weight: bold; text-shadow: 0 0 5px var(--neon-red); }
        
        button { pointer-events: auto; background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px; cursor: pointer; width: 100%; font-family: 'Courier New'; margin-top: 15px; }
        button:hover { background: var(--neon-blue); color: #000; }
        canvas { display: block; filter: contrast(1.1); }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="box">
            <h2>🛡️ 4D DATA VAULT</h2>
            <div class="stat">VAULT INTEGRITY: <span class="val" id="integrity">100%</span></div>
            <div class="stat">SECURE PORT: <span class="val" id="port">8080</span></div>
            <div class="stat">AMD MODE: <span class="val" id="mode">STABLE</span></div>
            <div class="stat">SHIFTS: <span class="val" id="shifts">0</span></div>
            <button onclick="window.location.href='/download_report'">DOWNLOAD FORENSICS</button>
        </div>
    </div>

    <div id="terminal-box">
        <div id="logs"></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const PARTICLE_COUNT = 550;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                    size: Math.random() * 2 + 0.5, type: 'defense',
                    orbit: 180 + Math.random() * 120, angle: Math.random() * Math.PI * 2
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw Protected Package (The Vault)
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(width/2 - 45, height/2 - 45, 90, 90);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.05)';
            ctx.fillRect(width/2 - 45, height/2 - 45, 90, 90);

            particles.forEach(p => {
                if (p.type === 'defense') {
                    p.angle += 0.004;
                    p.x = width/2 + Math.cos(p.angle) * p.orbit;
                    p.y = height/2 + Math.sin(p.angle) * p.orbit;
                } else {
                    p.x += p.vx; p.y += p.vy;
                    let dx = width/2 - p.x; let dy = height/2 - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 50) p.x = -500; // Neutralized
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.type === 'defense' ? '#00f3ff' : '#ff003c';
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        async function sync() {
            try {
                const res = await fetch('/system_status');
                const data = await res.json();
                
                document.getElementById('port').innerText = data.current_port;
                document.getElementById('integrity').innerText = data.integrity + "%";
                document.getElementById('mode').innerText = data.mode;
                document.getElementById('shifts').innerText = data.shift_count;
                
                if (data.threat_detected) {
                    addLog("CRITICAL: Spatial anomaly detected. Shifting temporal core.", true);
                    for(let i=0; i<6; i++) {
                        particles.push({
                            x: Math.random() * width, y: Math.random() * height,
                            vx: (width/2 - Math.random()*width)*0.03, vy: (height/2 - Math.random()*height)*0.03,
                            size: 3.5, type: 'attacker'
                        });
                    }
                } else {
                    addLog("Stability verified. AMD Infinity Guard heartbeat active.");
                }
            } catch (e) { console.error("Data sync interrupted."); }
        }

        function addLog(msg, isAlert = false) {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = isAlert ? 'alert' : '';
            div.innerText = `> ${msg}`;
            logs.prepend(div);
            if (logs.children.length > 9) logs.removeChild(logs.lastChild);
        }

        init(); draw();
        setInterval(sync, 1500);
        window.addEventListener('resize', init);
    </script>
</body>
</html>
